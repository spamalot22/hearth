# Git hooks for the Hearth monorepo — managed by Lefthook (https://lefthook.dev).
#
# One-time setup after cloning:  lefthook install
# Pre-commit runs fast checks (format + analyze + typecheck). The test suites run
# in CI (.github/workflows/ci.yml) on every push to main and every PR — not in a
# pre-push hook, which lefthook v2 skips for these fileless commands anyway.

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.dart"
      run: dart format --output=none --set-exit-if-changed {staged_files}
    analyze:
      glob: "*.dart"
      run: dart analyze --fatal-infos core app
    backend-typecheck:
      glob: "backend/**/*.ts"
      run: cd backend && pnpm typecheck
