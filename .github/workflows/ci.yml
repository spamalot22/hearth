# Full CI on every PR and push to main, so Dependabot (and any PR) shows pass/fail
# before merge: analyse + tests for all three packages, plus a release build for
# every platform — the build jobs catch dependency bumps that break compilation,
# not just the tests (e.g. the desugaring / url_launcher class of breakage).
name: ci

on:
  pull_request:
  push:
    branches: [main]

# Newer pushes to the same ref cancel older in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.2

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Resolve workspace deps
        working-directory: app
        run: flutter pub get
      - name: Analyze + test (core)
        working-directory: core
        run: |
          dart analyze --fatal-infos
          dart test

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Analyze + test (app)
        working-directory: app
        run: |
          flutter pub get
          flutter analyze
          flutter test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Typecheck + test (backend)
        working-directory: backend
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Set up disposable CI keystore
        working-directory: app/android
        run: |
          keytool -genkeypair -noprompt \
            -keystore app/ci-release.jks \
            -storepass ci-release-only \
            -keypass ci-release-only \
            -alias ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -dname "CN=Hearth CI"
          cat > key.properties <<'EOF'
          storePassword=ci-release-only
          keyPassword=ci-release-only
          keyAlias=ci-release
          storeFile=ci-release.jks
          EOF
      - name: Build APK
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --release --dart-define=APP_VERSION=ci

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build Windows
        working-directory: app
        run: |
          flutter pub get
          flutter build windows --release --dart-define=APP_VERSION=ci

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build web
        working-directory: app
        run: |
          flutter pub get
          flutter build web --release --dart-define=APP_VERSION=ci
