# Build the Hearth client and attach it to a GitHub Release on a version tag.
# Triggers on the same tags as the relay deploy, so one tag = one coordinated
# release: relay image → GHCR (deploy.yml) + client apps → this Release.
#
#   git tag 0.1.1 && git push origin 0.1.1
#
# The Android APK is debug-signed (fine to sideload; for the Play Store add a
# release signing config later). Linux/macOS/iOS are skipped for now.
name: release-app

on:
  push:
    tags:
      - 'v*' # v0.1.1
      - '[0-9]*' # 0.1.1

permissions:
  contents: write # create the GitHub Release + upload assets

env:
  FLUTTER_VERSION: 3.44.2

jobs:
  # Derive the version from the tag — the single source of truth for a release.
  # versionName is the semver (any leading "v" stripped); versionCode is a
  # monotonic integer (major*1e6 + minor*1e3 + patch) so Android accepts each
  # release as an in-place upgrade. No more hand-editing pubspec per release.
  version:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.compute.outputs.name }}
      code: ${{ steps.compute.outputs.code }}
    steps:
      - id: compute
        run: |
          TAG="${{ github.ref_name }}"
          NAME="${TAG#v}"                 # strip an optional leading "v"
          IFS=. read -r MAJ MIN PAT <<< "$NAME"
          PAT="${PAT%%-*}"                # drop any -prerelease suffix before maths
          # 10# forces base-10 so a zero-padded part can't be read as octal.
          CODE=$(( 10#${MAJ:-0} * 1000000 + 10#${MIN:-0} * 1000 + 10#${PAT:-0} ))
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag $TAG -> versionName $NAME, versionCode $CODE"

  android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Set up release keystore
        working-directory: app/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 not set — release will be debug-signed (in-place updates won't install)."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > app/hearth-release.jks
          cat > key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=hearth-release.jks
          EOF
          echo "Release keystore configured."
      - name: Build APK
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --release --build-name=${{ needs.version.outputs.name }} --build-number=${{ needs.version.outputs.code }} --dart-define=APP_VERSION=${{ github.ref_name }} --dart-define=RELEASE_PUBLIC_KEY=${{ vars.RELEASE_PUBLIC_KEY }}
      - run: mv app/build/app/outputs/flutter-apk/app-release.apk hearth-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: hearth-android.apk

  windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build Windows
        working-directory: app
        run: |
          flutter pub get
          flutter build windows --release --build-name=${{ needs.version.outputs.name }} --build-number=${{ needs.version.outputs.code }} --dart-define=APP_VERSION=${{ github.ref_name }} --dart-define=RELEASE_PUBLIC_KEY=${{ vars.RELEASE_PUBLIC_KEY }}
      - name: Zip
        run: Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath hearth-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: hearth-windows.zip

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build web
        working-directory: app
        run: |
          flutter pub get
          flutter build web --release --dart-define=APP_VERSION=${{ github.ref_name }} --dart-define=RELEASE_PUBLIC_KEY=${{ vars.RELEASE_PUBLIC_KEY }}
      - name: Zip
        run: cd app/build/web && zip -r "$GITHUB_WORKSPACE/hearth-web.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: hearth-web.zip

  release:
    needs: [android, windows, web]
    # Release whatever built, even if one platform failed, so a flaky native build
    # on one OS doesn't block shipping the others.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -lR dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # Sign a manifest of the built assets (SHA-256 + Ed25519) and publish it to the
  # relay so clients see the new version. No-ops gracefully when the signing key
  # or relay URL isn't configured, and never fails the release if the relay's down.
  publish-manifest:
    needs: [android, windows, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install backend deps
        working-directory: backend
        run: pnpm install --frozen-lockfile
      - name: Sign + publish manifest
        working-directory: backend
        env:
          RELEASE_PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
          RELEASE_SECRET: ${{ secrets.RELEASE_SECRET }}
          RELAY_URL: ${{ vars.RELAY_URL }}
        run: |
          if [ -z "$RELEASE_PRIVATE_KEY" ] || [ -z "$RELAY_URL" ]; then
            echo "RELEASE_PRIVATE_KEY / RELAY_URL not set — skipping manifest publish."
            exit 0
          fi
          echo "::add-mask::$RELAY_URL"   # keep the relay URL out of public Actions logs
          SEQ=$(date +%s)
          pnpm exec tsx src/sign-release.ts manifest "${{ github.ref_name }}" "$SEQ" "$RELEASE_PRIVATE_KEY" \
            android=../dist/hearth-android.apk windows=../dist/hearth-windows.zip > manifest.json
          echo "Publishing manifest (seq $SEQ) to the relay"
          curl -fsS -X POST "$RELAY_URL/version" \
            -H "authorization: Bearer $RELEASE_SECRET" \
            -H "content-type: application/json" \
            --data @manifest.json \
            || echo "::warning::manifest publish failed (relay down?) — publish it manually when the relay is up"
