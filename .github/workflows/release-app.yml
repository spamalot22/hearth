# Build the Hearth client and attach it to a GitHub Release on a version tag.
# Triggers on the same tags as the relay deploy, so one tag = one coordinated
# release: relay image → GHCR (deploy.yml) + client apps → this Release.
#
#   git tag 0.1.1 && git push origin 0.1.1
#
# The Android APK is debug-signed (fine to sideload; for the Play Store add a
# release signing config later). Linux/macOS/iOS are skipped for now.
name: release-app

on:
  push:
    tags:
      - 'v*' # v0.1.1
      - '[0-9]*' # 0.1.1

permissions:
  contents: write # create the GitHub Release + upload assets

env:
  FLUTTER_VERSION: 3.44.2

jobs:
  # Derive the version from the tag — the single source of truth for a release.
  # versionName is the semver (any leading "v" stripped); versionCode is a
  # monotonic integer (major*1e6 + minor*1e3 + patch) so Android accepts each
  # release as an in-place upgrade. No more hand-editing pubspec per release.
  version:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.compute.outputs.name }}
      code: ${{ steps.compute.outputs.code }}
    steps:
      - id: compute
        run: |
          TAG="${{ github.ref_name }}"
          NAME="${TAG#v}"                 # strip an optional leading "v"
          IFS=. read -r MAJ MIN PAT <<< "$NAME"
          PAT="${PAT%%-*}"                # drop any -prerelease suffix before maths
          # 10# forces base-10 so a zero-padded part can't be read as octal.
          CODE=$(( 10#${MAJ:-0} * 1000000 + 10#${MIN:-0} * 1000 + 10#${PAT:-0} ))
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag $TAG -> versionName $NAME, versionCode $CODE"

  android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Set up release keystore
        working-directory: app/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 not set — release will be debug-signed (in-place updates won't install)."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > app/hearth-release.jks
          cat > key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=hearth-release.jks
          EOF
          echo "Release keystore configured."
      - name: Build APK
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --release --build-name=${{ needs.version.outputs.name }} --build-number=${{ needs.version.outputs.code }} --dart-define=APP_VERSION=${{ github.ref_name }} --dart-define=RELEASE_PUBLIC_KEY=${{ vars.RELEASE_PUBLIC_KEY }} --dart-define=RELAY_URL=${{ vars.RELAY_URL }}
      - run: mv app/build/app/outputs/flutter-apk/app-release.apk hearth-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: hearth-android.apk

  windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build Windows
        working-directory: app
        run: |
          flutter pub get
          flutter build windows --release --build-name=${{ needs.version.outputs.name }} --build-number=${{ needs.version.outputs.code }} --dart-define=APP_VERSION=${{ github.ref_name }} --dart-define=RELEASE_PUBLIC_KEY=${{ vars.RELEASE_PUBLIC_KEY }} --dart-define=RELAY_URL=${{ vars.RELAY_URL }}
      - name: Zip
        run: Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath hearth-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: hearth-windows.zip

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build web
        working-directory: app
        run: |
          flutter pub get
          flutter build web --release --dart-define=APP_VERSION=${{ github.ref_name }} --dart-define=RELEASE_PUBLIC_KEY=${{ vars.RELEASE_PUBLIC_KEY }} --dart-define=RELAY_URL=${{ vars.RELAY_URL }}
      - name: Zip
        run: cd app/build/web && zip -r "$GITHUB_WORKSPACE/hearth-web.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: hearth-web.zip

  # GitHub releases are immutable once published (no asset changes, ever), so
  # the flow is: upload everything to a DRAFT, then flip it to published only
  # when all platforms built, then tell the relay. A partial build leaves a
  # draft (re-runnable, or publishable by hand); it can never lock in a
  # half-empty published release.
  release:
    needs: [android, windows, web]
    # Run even if a platform failed so its assets land on the draft — but the
    # publish step below only fires when everything built.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard against a pre-published release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # releases/tags only resolves *published* releases; drafts 404 here.
          if gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" --jq .id >/dev/null 2>&1; then
            echo "::error::A published release already exists for ${{ github.ref_name }} — it is immutable, so CI cannot attach assets. Release by pushing a tag (git tag X.Y.Z && git push origin X.Y.Z), not via the GitHub UI publish button, and cut a new patch tag now."
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install backend deps
        working-directory: backend
        run: pnpm install --frozen-lockfile
      - name: Sign manifest
        working-directory: backend
        env:
          RELEASE_PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
        run: |
          if [ -z "$RELEASE_PRIVATE_KEY" ]; then
            echo "RELEASE_PRIVATE_KEY not set — skipping manifest signing."
            exit 0
          fi
          SEQ=$(date +%s)
          pnpm exec tsx src/sign-release.ts manifest "${{ github.ref_name }}" "$SEQ" "$RELEASE_PRIVATE_KEY" \
            android=../dist/hearth-android.apk windows=../dist/hearth-windows.zip > ../dist/manifest.json
      - run: ls -lR dist
      - name: Create draft release with assets
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true
      - name: Publish release
        # Only a complete release gets published (immutably). Otherwise the
        # draft stays for a re-run to finish or a human to judge.
        if: |
          needs.android.result == 'success' &&
          needs.windows.result == 'success' &&
          needs.web.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PATCH "repos/${{ github.repository }}/releases/${{ steps.gh_release.outputs.id }}" \
            -F draft=false --jq .html_url
      - name: Publish manifest to relay
        # After the GH release is live — clients download assets from it, and
        # draft assets aren't publicly fetchable. A failed publish step above
        # stops the job, so ordering alone guarantees this never runs early.
        if: |
          needs.android.result == 'success' &&
          needs.windows.result == 'success' &&
          needs.web.result == 'success'
        env:
          RELEASE_SECRET: ${{ secrets.RELEASE_SECRET }}
          RELAY_URL: ${{ vars.RELAY_URL }}
        run: |
          if [ -z "$RELEASE_SECRET" ] || [ -z "$RELAY_URL" ]; then
            echo "RELEASE_SECRET / RELAY_URL not set — skipping."
            exit 0
          fi
          echo "::add-mask::$RELAY_URL"
          echo "Publishing manifest to the relay"
          curl -fsS -X POST "$RELAY_URL/version" \
            -H "authorization: Bearer $RELEASE_SECRET" \
            -H "content-type: application/json" \
            --data @dist/manifest.json
