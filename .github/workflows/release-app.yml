# Build the Hearth client and attach it to a GitHub Release on a version tag.
# Triggers on the same tags as the relay deploy, so one tag = one coordinated
# release: relay image → GHCR (deploy.yml) + client apps → this Release.
#
#   git tag 0.1.1 && git push origin 0.1.1
#
# The Android APK is debug-signed (fine to sideload; for the Play Store add a
# release signing config later). Linux/macOS/iOS are skipped for now.
name: release-app

on:
  push:
    tags:
      - 'v*' # v0.1.1
      - '[0-9]*' # 0.1.1

permissions:
  contents: write # create the GitHub Release + upload assets

env:
  FLUTTER_VERSION: 3.44.2

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build APK
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --release
      - run: mv app/build/app/outputs/flutter-apk/app-release.apk hearth-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: hearth-android.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build Windows
        working-directory: app
        run: |
          flutter pub get
          flutter build windows --release
      - name: Zip
        run: Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath hearth-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: hearth-windows.zip

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build web
        working-directory: app
        run: |
          flutter pub get
          flutter build web --release
      - name: Zip
        run: cd app/build/web && zip -r "$GITHUB_WORKSPACE/hearth-web.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: hearth-web.zip

  release:
    needs: [android, windows, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -lR dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
