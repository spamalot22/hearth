# pnpm reads project settings from here. esbuild backs tsx + vitest; approve its
# post-install build (pnpm 10+ blocks build scripts by default, so a fresh install
# would otherwise fail with ERR_PNPM_IGNORED_BUILDS).
allowBuilds:
  esbuild: true

# Security floors for transitive build tooling. The stale lockfile pinned vitest's
# vite to a vulnerable 5.x (+ esbuild 0.21.x); these force patched versions across
# the whole tree, clearing the Dependabot advisories (vite server.fs.deny bypass /
# path traversal, esbuild dev-server request smuggling). pnpm 11 reads overrides
# here, not from package.json's "pnpm" field.
overrides:
  vite: '>=6.4.3'
  esbuild: '>=0.25.0'
