# pnpm reads project settings from here. esbuild backs tsx + vitest; approve its
# post-install build (pnpm 10+ blocks build scripts by default, so a fresh install
# would otherwise fail with ERR_PNPM_IGNORED_BUILDS).
allowBuilds:
  esbuild: true

# Security floors for transitive build tooling. The stale lockfile pinned vitest's
# vite to a vulnerable 5.x; this forces a patched version across the whole tree,
# clearing the Dependabot advisory (vite server.fs.deny bypass / path traversal).
# esbuild override removed — direct devDependency ^0.28.1 satisfies the floor.
overrides:
  vite: '>=6.4.3'
