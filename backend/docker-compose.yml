# Hearth relay stack — the self-hosted cold-start bootstrap. This file IS the IaC.
# NOTE: keep relay env/volumes in sync with docker-compose.tailscale.yml.
#
#   cp .env.example .env       # media keys optional; TUNNEL_TOKEN only for cloudflare
#   docker compose up -d --build
#
# By default this runs ONLY the relay, published to the box's loopback
# (127.0.0.1:8787) — nothing on the LAN or public internet. You expose it with a
# tunnel running on the box:
#   • Tailscale (no domain):  tailscale funnel --bg 8787   (public HTTPS)
#                             tailscale serve  --bg 8787   (tailnet-only)
#   • Cloudflare (domain + token):  docker compose --profile cloudflare up -d
services:
  relay:
    build: .
    image: ghcr.io/spamalot22/hearth-relay:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: always
    environment:
      PORT: 8787
      # Media-search proxy keys — search degrades gracefully if unset.
      GIPHY_KEY: ${GIPHY_KEY:-}
      FREESOUND_KEY: ${FREESOUND_KEY:-}
      # Auto-update: shared secret for POST /version (sign-release.ts pushes here).
      RELEASE_SECRET: ${RELEASE_SECRET:-}
      GITHUB_REPO: ${GITHUB_REPO:-spamalot22/hearth}
    volumes:
      - relay-data:/app/data
    # Loopback only: reachable by a tunnel/funnel on the box, never the LAN. (Still
    # reachable as `relay:8787` inside the compose network, e.g. by cloudflared.)
    ports:
      - "127.0.0.1:8787:8787"

  # Opt-in Cloudflare path: `docker compose --profile cloudflare up -d`. Routes a
  # named tunnel's public hostname to http://relay:8787 (set TUNNEL_TOKEN in .env).
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - relay
    profiles:
      - cloudflare

volumes:
  relay-data:
